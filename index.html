<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>XÆRTH Maintenance</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:black;
color:red;
font-family:monospace;
text-align:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

h1{
max-width:90%;
font-size:18px;
margin-bottom:40px;
}

#contador{
font-size:45px;
letter-spacing:5px;
color:red;
text-shadow:0 0 15px red;
}

p{
color:white;
margin-top:20px;
font-size:14px;
}
</style>
</head>

<body>

<h1>
Estamos teniendo demasiadas fallas el día de hoy, nuestra página web estará en mantenimiento el día de hoy.<br><br>
XÆRTH ofrece una disculpa.<br><br>
Cualquier problema u otro tema contacte al correo:<br>
<b>somosxaerth@gmail.com</b>
</h1>

<div id="contador">00:00:00</div>

<p>Mantenimiento programado</p>

<script>

// ⚠️ Hora Chile — cambia solo si quieres otra hora
const fechaFinal = new Date();
fechaFinal.setHours(20,30,0); // 20:30 PM

function actualizarContador(){

const ahora = new Date();
const diferencia = fechaFinal - ahora;

if(diferencia <= 0){
document.getElementById("contador").innerText="YA DISPONIBLE";
return;
}

let horas = Math.floor(diferencia / (1000*60*60));
let minutos = Math.floor((diferencia % (1000*60*60))/(1000*60));
let segundos = Math.floor((diferencia % (1000*60))/1000);

horas = horas.toString().padStart(2,"0");
minutos = minutos.toString().padStart(2,"0");
segundos = segundos.toString().padStart(2,"0");

document.getElementById("contador").innerText =
`${horas}:${minutos}:${segundos}`;
}

setInterval(actualizarContador,1000);
actualizarContador();

</script>

</body>
</html>
