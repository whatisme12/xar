<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Contador XAERTH</title>

<style>
body{
    background:black;
    color:red;
    font-family:monospace;
    text-align:center;
    margin:0;
    padding-top:100px;
}

h1{
    font-size:28px;
}

#countdown{
    font-size:40px;
    margin-top:40px;
}
</style>
</head>
<body>

<h1>POSIBLE NUEVA NOTICIA, O ARREGLO DE EL TRADUCTOR.</h1>
<div id="countdown">Cargando...</div>

<script>
// Fecha objetivo: 3 de marzo 2026 19:25 (Chile)
const targetDate = new Date("March 3, 2026 19:25:00").getTime();

let audioContext = new (window.AudioContext || window.webkitAudioContext)();
let tickInterval = 1000;

function playTick(intensity){
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();

    oscillator.type = "square";
    oscillator.frequency.setValueAtTime(800 + intensity, audioContext.currentTime);

    gainNode.gain.setValueAtTime(0.05 + intensity/5000, audioContext.currentTime);

    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);

    oscillator.start();
    oscillator.stop(audioContext.currentTime + 0.05);
}

function updateCountdown(){
    const now = new Date().getTime();
    const distance = targetDate - now;

    if(distance <= 0){
        document.getElementById("countdown").innerHTML = "¡YA ES LA HORA!";
        return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
        days + "d " + hours + "h " + minutes + "m " + seconds + "s";

    // Intensidad aumenta cuando queda menos tiempo
    let intensity = 0;
    if(days < 7) intensity = 200;
    if(days < 3) intensity = 400;
    if(days < 1) intensity = 800;
    if(hours < 1) intensity = 1200;

    playTick(intensity);
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
