<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Traductor XÆRTH Secreto</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Press Start 2P', cursive;
    background: #000;
    color: #0f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

/* Anuncio */
#anuncio {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.95);

    color: #f00;
}

/* Reloj de arena y contador */
#reloj {font-size: 20px; animation: parpadeo 1s infinite;}
@keyframes parpadeo {0%,100%{opacity:1}50%{opacity:0.3}}
#contador {margin-top:10px;font-size:12px;}

/* Contenido principal */
#contenido {display:none; width:95%; max-width:650px; margin-top:30px; text-align:center;} /* más ancho en móvil */
textarea {width:100%; height:100px; font-family:'Press Start 2P'; font-size:10px;} /* letra más pequeña */
button {margin:8px; padding:8px 16px; font-family:'Press Start 2P'; font-size:10px; cursor:pointer;}

</style>
</head>
<body>

</div>

<div id="contenido">
    <h1>BIENVENIDO A TRADUCTOR DE XÆRTH</h1>
    <select id="idiomas">
        <option value="es">Español</option>
        <option value="en">Inglés</option>
        <option value="fr">Francés</option>
        <option value="de">Alemán</option>
        <option value="it">Italiano</option>
        <option value="pt">Portugués</option>
        <option value="jp">Japonés</option>
        <option value="ko">Coreano</option>
        <option value="ru">Ruso</option>
        <option value="ar">Árabe</option>
        <option value="cn">Chino Simplificado</option>
        <option value="xaerth">XÆRTH</option>
    </select>
    <textarea id="entrada" placeholder="Escribe aquí..."></textarea><br>
    <button onclick="traducir('aXaerth')">Idioma → XÆRTH</button>
    <button onclick="traducir('aEsp')">XÆRTH → Idioma</button>
    <textarea id="salida" placeholder="Resultado..." readonly></textarea>
</div>

<script>
const anuncio = document.getElementById('anuncio');
document.getElementById('cerrar').onclick = ()=>{anuncio.style.display='none';document.getElementById('contenido').style.display='block'}

// FUNCIONES DE XAERTH SECRETO
function codificarXAERTH(texto){
    const simbolos = ['Δ','Ψ','ζ','ξ','Ω','Λ','Θ','Φ','Σ','Ξ'];
    let resultado='';
    for(let i=0;i<texto.length;i++){
        const c = texto.charCodeAt(i);
        const pos = i+1;
        const s = simbolos[(c+pos)%simbolos.length];
        resultado += s;
    }
    return 'XR-'+resultado+'-R̴';
}

function decodificarXAERTH(texto){
    // Solo reversible con el patrón exacto
    return "[CONTENIDO SECRETO - REQUIERE CLAVE INTERNA]";
}

function traducir(direccion){
    const texto=document.getElementById('entrada').value;
    let res='';
    if(direccion==='aXaerth') res=codificarXAERTH(texto);
    else res=decodificarXAERTH(texto);
    document.getElementById('salida').value=res;
}
</script>

</html>
