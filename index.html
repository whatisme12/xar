"A":"|ʌ","B":"|•","C":"|⌒","D":"|ˣ",

}

function esXaerth(texto){
return texto.includes("ʌ") ||
texto.includes("•") ||
texto.includes("⌒") ||
texto.includes("ˣ");
}

}else{

i++;
}

}
