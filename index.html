<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mantenimiento Traductor XÆRTH</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Press Start 2P', cursive;
    background: #000;
    color: #0f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
}

/* Mensaje principal */
#mensaje {
    font-size: 14px;
    max-width: 90%;
    margin-bottom: 20px;
    transition: color 0.3s;
}

/* Contador */
#contador {
    font-size: 12px;
    margin-bottom: 30px;
}

/* Botón pixel */
#contacto {
    display: inline-block;
    background-color: #00f;
    color: #fff;
    text-decoration: none;
    padding: 10px 20px;
    font-family: 'Press Start 2P', cursive;
    font-size: 12px;
    border: 2px solid #00f;
    cursor: pointer;
    margin-top: 10px;
}
#contacto:hover {
    background-color: #0000aa;
}

/* Flecha */
#contacto::before {
    content: "✉️ ";
}
</style>
</head>
<body>

<div id="mensaje">Estamos teniendo problemas con el traductor de XAERTH, próximamente se encontrará nuevamente disponible</div>
<div id="contador">HORARIO ESPERADO: 00h 00m 00s</div>
<a id="contacto" href="mailto:somosxaerth@gmail.com">CONTACTAR</a>

<script>
// Cambiar color de las letras aleatoriamente entre rojo, verde y azul
const mensaje = document.getElementById('mensaje');
const colores = ['#f00','#0f0','#00f'];
setInterval(() => {
    mensaje.style.color = colores[Math.floor(Math.random()*colores.length)];
}, 500);

// Contador hasta 13:00 PM CL
function actualizarContador(){
    const ahora = new Date();
    const destino = new Date();
    destino.setHours(13,0,0,0); // 13:00
    let diff = destino - ahora;
    if(diff < 0) diff = 0;
    const h = Math.floor(diff / (1000*60*60));
    const m = Math.floor((diff % (1000*60*60)) / (1000*60));
    const s = Math.floor((diff % (1000*60)) / 1000);
    document.getElementById('contador').innerText = `HORARIO ESPERADO: ${h}h ${m}m ${s}s`;
}
setInterval(actualizarContador, 1000);
actualizarContador();
</script>

</body>
</html>
