<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>XÆRTH Translator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
background:black;
color:lime;
font-family:monospace;
text-align:center;
}

textarea{
width:90%;
height:120px;
background:black;
color:lime;
border:1px solid lime;
font-size:18px;
margin-top:20px;
}

button{
margin-top:15px;
padding:10px;
background:black;
color:lime;
border:1px solid lime;
cursor:pointer;
}

#output{
margin-top:20px;
font-size:20px;
word-wrap:break-word;
}
</style>
</head>

<body>

<h1>XÆRTH TRANSLATOR</h1>

<textarea id="input"
placeholder="Escribe Español o XÆRTH..."></textarea>

<br>

<button onclick="traducir()">TRADUCIR</button>

<p id="output"></p>

<script>

/* ===== ALFABETO ===== */

const mapa={
"A":"|ʌ","B":"|•","C":"|⌒","D":"|ˣ",
"E":"─ʌ","F":"─•","G":"─⌒","H":"─ˣ",
"I":"∥ʌ","J":"∥•","K":"∥⌒","L":"∥ˣ",
"M":"/ʌ","N":"/•","O":"/ˣ",
"P":"\\ʌ","Q":"\\•","R":"\\⌒","S":"\\ˣ",
"T":"+ʌ","U":"+•","V":"+⌒","W":"+ˣ",
"X":"◇ʌ","Y":"◇•","Z":"◇⌒"
};

/* mapa inverso */
const inverso={};
for(let letra in mapa){
inverso[mapa[letra]]=letra;
}

/* detectar idioma */
function esXaerth(texto){
return texto.includes("ʌ") ||
texto.includes("•") ||
texto.includes("⌒") ||
texto.includes("ˣ");
}

function traducir(){

let texto=document
.getElementById("input")
.value
.trim()
.toUpperCase();

let resultado="";

/* ===== XAERTH → ESPAÑOL ===== */
if(esXaerth(texto)){

let partes=texto.split(" ");

partes.forEach(p=>{
if(inverso[p]){
resultado+=inverso[p];
}else{
resultado+=" ";
}
});

}

/* ===== ESPAÑOL → XAERTH ===== */
else{

for(let letra of texto){

if(mapa[letra]){
resultado+=mapa[letra]+" ";
}else{
resultado+=letra+" ";
}

}

}

document.getElementById("output").innerText=resultado.trim();

}

</script>

</body>
</html>
