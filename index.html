<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traductor XÆRTH</title>
<!-- Fuente pixel -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
    body {
        margin: 0;
        font-family: 'Press Start 2P', cursive;
        background-color: #000;
        color: #0f0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    /* Anuncio */
    #anuncio {
        position: fixed;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0,0,0,0.95);
        color: #fff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        text-align: center;
    }

    #anuncio h1, #anuncio p {
        margin: 10px;
    }

    #cerrar {
        position: absolute;
        top: 10px;
        right: 20px;
        font-size: 20px;
        cursor: pointer;
        color: #f00;
    }

    /* Reloj de arena pixel */
    #reloj {
        font-size: 24px;
        margin: 20px;
        animation: parpadeo 1s infinite;
    }

    @keyframes parpadeo {
        0%, 100% {opacity: 1;}
        50% {opacity: 0.3;}
    }

    /* Contador */
    #contador {
        font-size: 16px;
        margin-top: 10px;
    }

    /* Contenido principal */
    #contenido {
        display: none;
        width: 90%;
        max-width: 600px;
        margin-top: 40px;
        text-align: center;
    }

    #contenido textarea {
        width: 100%;
        height: 100px;
        font-family: 'Press Start 2P', cursive;
        font-size: 12px;
    }

    #contenido button {
        margin: 10px;
        padding: 10px 20px;
        font-family: 'Press Start 2P', cursive;
        font-size: 12px;
        cursor: pointer;
    }

    select {
        margin-bottom: 10px;
        padding: 5px;
        font-family: 'Press Start 2P', cursive;
    }
</style>
</head>
<body>

<!-- ANUNCIO -->
<div id="anuncio">
    <div id="cerrar">X</div>
    <h1>NUESTRO TRADUCTOR XÆRTH ESTARÁ EN MANTENIMIENTO EL DÍA 1 DE MARZO</h1>
    <h1>Y VOLVERÁ TAMBIÉN EL DÍA 1 DE MARZO</h1>
    <div id="reloj">⌛</div>
    <div id="contador"></div>
</div>

<!-- CONTENIDO PRINCIPAL -->
<div id="contenido">
    <h1>BIENVENIDO A TRADUCTOR DE XÆRTH</h1>

    <select id="idiomas">
        <option value="es">Español</option>
        <option value="en">Inglés</option>
        <option value="fr">Francés</option>
        <option value="de">Alemán</option>
        <option value="it">Italiano</option>
        <option value="pt">Portugués</option>
        <option value="jp">Japonés</option>
        <option value="ko">Coreano</option>
        <option value="ru">Ruso</option>
        <option value="ar">Árabe</option>
        <option value="cn">Chino Simplificado</option>
        <option value="xaerth">XÆRTH</option>
    </select>

    <textarea id="entrada" placeholder="Escribe aquí..."></textarea><br>
    <button onclick="traducir('aXaerth')">Idioma → XÆRTH</button>
    <button onclick="traducir('aEsp')">XÆRTH → Idioma</button>
    <textarea id="salida" placeholder="Resultado..." readonly></textarea>
</div>

<script>
    // ANUNCIO
    const anuncio = document.getElementById('anuncio');
    document.getElementById('cerrar').addEventListener('click', () => {
        anuncio.style.display = 'none';
        document.getElementById('contenido').style.display = 'block';
    });

    // CONTADOR HASTA 13:00
    function actualizarContador() {
        const ahora = new Date();
        const destino = new Date();
        destino.setHours(13,0,0,0);
        let diff = destino - ahora;
        if(diff < 0) diff = 0;
        const horas = Math.floor(diff / (1000*60*60));
        const min = Math.floor((diff % (1000*60*60)) / (1000*60));
        const seg = Math.floor((diff % (1000*60)) / 1000);
        document.getElementById('contador').innerText = `Tiempo restante: ${horas}h ${min}m ${seg}s`;
    }
    setInterval(actualizarContador, 1000);

    // TRADUCTOR SIMPLE XAERTH
    function traducir(direccion){
        const texto = document.getElementById('entrada').value;
        let resultado = "";
        if(direccion === 'aXaerth'){
            // Ejemplo de traducción a XAERTH Nivel básico
            resultado = texto.split('').map(c => {
                const mapa = {'a':'æ','e':'ë','i':'ï','o':'ø','u':'ü','A':'Æ','E':'Ë','I':'Ï','O':'Ø','U':'Ü'};
                return mapa[c] || c;
            }).join('');
        } else {
            // Ejemplo simple de vuelta a español
            resultado = texto.split('').map(c => {
                const mapa = {'æ':'a','ë':'e','ï':'i','ø':'o','ü':'u','Æ':'A','Ë':'E','Ï':'I','Ø':'O','Ü':'U'};
                return mapa[c] || c;
            }).join('');
        }
        document.getElementById('salida').value = resultado;
    }
</script>

</body>
</html>
