<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>XÆRTH Translator</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:black;
color:lime;
font-family:monospace;
text-align:center;
margin:0;
}

h1{margin-top:30px;}

textarea{
width:90%;
height:120px;
background:black;
color:lime;
border:1px solid lime;
font-size:16px;
}

button{
margin:10px;
padding:10px;
background:black;
color:lime;
border:1px solid lime;
cursor:pointer;
}

#output{
margin-top:20px;
font-size:18px;
word-wrap:break-word;
}
</style>
</head>

<body>

<h1>XÆRTH TRANSLATOR</h1>

<textarea id="input" placeholder="Escribe aquí..."></textarea>
<br>

<button onclick="aXaerth()">Español → XÆRTH</button>
<button onclick="aEspanol()">XÆRTH → Español</button>

<p id="output"></p>

<script>

/* ===== ALFABETO XÆRTH ===== */

const mapa = {
"A":"|ʌ","B":"|•","C":"|⌒","D":"|ˣ",
"E":"─ʌ","F":"─•","G":"─⌒","H":"─ˣ",
"I":"∥ʌ","J":"∥•","K":"∥⌒","L":"∥ˣ",
"M":"/ʌ","N":"/•","Ñ":"/⌒","O":"/ˣ",
"P":"\\ʌ","Q":"\\•","R":"\\⌒","S":"\\ˣ",
"T":"+ʌ","U":"+•","V":"+⌒","W":"+ˣ",
"X":"◇ʌ","Y":"◇•","Z":"◇⌒"
};

/* ===== INVERSO (CLAVE DEL ARREGLO) ===== */

const mapaInverso = {};
for(let letra in mapa){
mapaInverso[mapa[letra]] = letra;
}

/* ===== ESPAÑOL → XÆRTH ===== */

function aXaerth(){

let texto =
document.getElementById("input")
.value
.toUpperCase();

let resultado="";

for(let i=0;i<texto.length;i++){

let c = texto[i];

if(mapa[c]){
resultado += mapa[c]+" ";
}else{
resultado += c;
}

}

document.getElementById("output")
.innerText = resultado.trim();
}

/* ===== XÆRTH → ESPAÑOL ===== */

function aEspanol(){

let texto =
document.getElementById("input")
.value
.trim();

/* IMPORTANTE:
separamos por espacios
cada símbolo es una letra
*/

let simbolos = texto.split(" ");

let resultado="";

simbolos.forEach(simbolo=>{
if(mapaInverso[simbolo]){
resultado += mapaInverso[simbolo];
}else{
resultado += simbolo;
}
});

document.getElementById("output")
.innerText = resultado;
}

</script>

</body>
</html>
